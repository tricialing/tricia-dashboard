<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f4f1ec; color:#2a2520; font-family:'Cormorant Garamond',Georgia,serif; font-weight:300; -webkit-font-smoothing:antialiased; }
header { padding:3rem 3rem 1.5rem; max-width:1400px; margin:0 auto; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem; }

h1 { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:300; letter-spacing:0.05em; line-height:1; }
.header-sub { font-size:0.75rem; letter-spacing:0.15em; color:#b0aaa3; font-style:italic; margin-top:0.25rem; }
.legend { display:flex; flex-wrap:wrap; gap:0.5rem 1.2rem; }
.li { display:flex; align-items:center; gap:0.35rem; font-size:0.66rem; letter-spacing:0.07em; color:#8b8580; }
.ld { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
hr.rule { border:none; border-top:1px solid #e4dfd6; max-width:1400px; margin:0 auto; }
.wrap { max-width:1400px; margin:0 auto; padding:0 3rem 5rem; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.chart { padding-top:1.5rem; }

.year-row { display:flex; }
.yb { font-size:0.62rem; letter-spacing:0.16em; color:#b0aaa3; text-align:center; border-left:1px solid #e4dfd6; padding-bottom:0.3rem; flex-shrink:0; }
.month-row { display:flex; margin-bottom:1.2rem; border-bottom:1px solid #e4dfd6; }
.mb { font-size:0.48rem; color:#ccc8c0; text-align:center; border-left:1px solid #f0ece4; padding:0.18rem 0; flex-shrink:0; overflow:hidden; }

.phase-row { display:flex; align-items:center; margin:2rem 0 0.5rem; }
.pl { flex-shrink:0; padding-right:1rem; text-align:right; font-size:0.52rem; letter-spacing:0.18em; color:#b0aaa3; text-transform:uppercase; }
.pline { flex:1; height:1px; background:#e4dfd6; }
.ptitle { margin-left:0.8rem; font-size:0.6rem; letter-spacing:0.12em; color:#b0aaa3; font-style:italic; white-space:nowrap; }

.track { display:flex; align-items:center; margin-bottom:4px; }
.tlabel { flex-shrink:0; padding-right:1rem; text-align:right; }
.tn { font-size:0.72rem; letter-spacing:0.02em; color:#2a2520; line-height:1.2; }
.ts { font-size:0.56rem; letter-spacing:0.06em; color:#b0aaa3; font-style:italic; margin-top:1px; }
.tbody { flex:1; height:32px; position:relative; border-bottom:1px solid #f8f5f0; }

.bar { position:absolute; height:20px; top:6px; border-radius:2px; display:flex; align-items:center; padding:0 6px; cursor:pointer; transition:filter 0.15s,transform 0.15s; overflow:hidden; white-space:nowrap; }
.bar:hover { filter:brightness(0.88); transform:translateY(-1px); z-index:10; }
.bl { font-size:0.59rem; letter-spacing:0.04em; color:rgba(42,37,32,0.72); overflow:hidden; text-overflow:ellipsis; pointer-events:none; }

.ms { position:absolute; top:50%; transform:translate(-50%,-50%); width:11px; height:11px; border-radius:50%; border:2px solid #f4f1ec; cursor:pointer; z-index:8; transition:transform 0.15s; }
.ms:hover { transform:translate(-50%,-50%) scale(1.6); z-index:20; }
.msl { position:absolute; top:-19px; left:50%; transform:translateX(-50%); font-size:0.52rem; letter-spacing:0.04em; color:#8b8580; white-space:nowrap; pointer-events:none; font-style:italic; }

.today-line { position:absolute; top:-30px; bottom:0; width:1px; background:#c49a2a; opacity:0.5; z-index:20; pointer-events:none; }

.gridl { position:absolute; top:0; bottom:0; width:1px; background:#f0ece4; pointer-events:none; }
.gridl.yr { background:#e8e4dc; }

.tooltip { position:fixed; background:#2a2520; color:#f4f1ec; padding:0.65rem 0.95rem; font-size:0.76rem; line-height:1.65; border-radius:2px; pointer-events:none; z-index:200; max-width:240px; display:none; }
.tooltip.on { display:block; }
.tt-t { font-weight:400; font-size:0.82rem; margin-bottom:0.1rem; }
.tt-d { font-size:0.63rem; color:#b0aaa3; font-style:italic; margin-top:0.25rem; }

<body>

<hr class="rule">
<div class="wrap"><div class="chart" id="chart"></div></div>

<script>
// ── TIME CONFIG ──
// Mar 2026 → Mar 2030 = 49 months
const SY = 2026, SM = 3;  // start year/month (1-indexed)
const EY = 2030, EM = 3;
const CW = 19;   // px per month
const LW = 188;  // label width px
const MNAMES = ['J','F','M','A','M','J','J','A','S','O','N','D'];

function colOf(y, m) { return (y - SY) * 12 + (m - SM); }
function xOf(y, m)   { return Math.max(0, colOf(y, m)) * CW; }
const TOTAL_COLS = colOf(EY, EM) + 1;

// ── TOOLTIP ──
const ttEl = document.getElementById('tt');
function showTip(e, title, body, date) {
  document.getElementById('tt-t').textContent = title;
  document.getElementById('tt-b').textContent = body || '';
  document.getElementById('tt-d').textContent = date || '';
  ttEl.classList.add('on');
  moveTip(e);
}
function moveTip(e) {
  let lx = e.clientX + 14, ly = e.clientY + 14;
  if (lx + 250 > window.innerWidth)  lx = e.clientX - 254;
  if (ly + 130 > window.innerHeight) ly = e.clientY - 110;
  ttEl.style.left = lx + 'px';
  ttEl.style.top  = ly + 'px';
}
function hideTip() { ttEl.classList.remove('on'); }

// ── TIME HEADER ──
function buildHeader(root) {
  // Year row
  const yr = document.createElement('div');
  yr.className = 'year-row';
  yr.style.marginLeft = LW + 'px';
  for (let y = SY; y <= EY; y++) {
    const m0 = y === SY ? SM : 1;
    const m1 = y === EY ? EM : 12;
    const cols = m1 - m0 + 1;
    const el = document.createElement('div');
    el.className = 'yb';
    el.style.width = el.style.minWidth = (cols * CW) + 'px';
    el.textContent = y;
    yr.appendChild(el);
  }
  root.appendChild(yr);

  // Month row
  const mr = document.createElement('div');
  mr.className = 'month-row';
  mr.style.marginLeft = LW + 'px';
  for (let c = 0; c < TOTAL_COLS; c++) {
    const absM = (SM - 1 + c) % 12;
    const el = document.createElement('div');
    el.className = 'mb';
    el.style.width = el.style.minWidth = CW + 'px';
    el.textContent = MNAMES[absM];
    mr.appendChild(el);
  }
  root.appendChild(mr);
}

// ── PHASE DIVIDER ──
function buildPhase(root, title) {
  const row = document.createElement('div');
  row.className = 'phase-row';
  row.innerHTML = `<div class="pl" style="width:${LW}px"></div><div class="pline"></div><span class="ptitle">${title}</span>`;
  root.appendChild(row);
}

// ── TRACK ──
function buildTrack(root, name, sub, bars, milestones, isFirst) {
  const track = document.createElement('div');
  track.className = 'track';

  const lbl = document.createElement('div');
  lbl.className = 'tlabel';
  lbl.style.width = LW + 'px';
  lbl.innerHTML = `<div class="tn">${name}</div>${sub?`<div class="ts">${sub}</div>`:''}`;

  const body = document.createElement('div');
  body.className = 'tbody';
  body.style.minWidth = (TOTAL_COLS * CW) + 'px';

  // Grid lines
  for (let c = 0; c < TOTAL_COLS; c++) {
    const absM = (SM - 1 + c) % 12;
    if (absM === 0) {
      const gl = document.createElement('div');
      gl.className = 'gridl yr';
      gl.style.left = (c * CW) + 'px';
      body.appendChild(gl);
    } else if (absM % 3 === 0) {
      const gl = document.createElement('div');
      gl.className = 'gridl';
      gl.style.left = (c * CW) + 'px';
      body.appendChild(gl);
    }
  }

  // Today line on first track
  if (isFirst) {
    // Mar 7 2026 ≈ col 0 + 6/31 * CW
    const todayX = (6 / 31) * CW;
    const tl = document.createElement('div');
    tl.className = 'today-line';
    tl.style.left = todayX + 'px';
    tl.innerHTML = '<div class="today-lbl">today</div>';
    body.appendChild(tl);
  }

  bars.forEach(b => {
    const bx = xOf(b.s[0], b.s[1]);
    const bw = xOf(b.e[0], b.e[1]) - bx;
    if (bw <= 0) return;
    const el = document.createElement('div');
    el.className = 'bar';
    el.style.cssText = `left:${bx}px;width:${bw}px;background:${b.color}`;
    el.innerHTML = `<span class="bl">${b.label}</span>`;
    el.addEventListener('mouseenter', e => showTip(e, b.label, b.tip, b.dates));
    el.addEventListener('mousemove', moveTip);
    el.addEventListener('mouseleave', hideTip);
    body.appendChild(el);
  });

  (milestones||[]).forEach(m => {
    const mx = xOf(m.d[0], m.d[1]);
    const el = document.createElement('div');
    el.className = 'ms';
    el.style.cssText = `left:${mx}px;background:${m.color}`;
    el.innerHTML = `<span class="msl">${m.label}</span>`;
    el.addEventListener('mouseenter', e => showTip(e, m.label, m.tip, m.date));
    el.addEventListener('mousemove', moveTip);
    el.addEventListener('mouseleave', hideTip);
    body.appendChild(el);
  });

  track.appendChild(lbl);
  track.appendChild(body);
  root.appendChild(track);
}
