<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Season, Brand Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f4f1ec; color:#2a2520; font-family:'Cormorant Garamond',Georgia,serif; font-weight:300; -webkit-font-smoothing:antialiased; }
header { padding:3rem 3rem 1.5rem; max-width:1400px; margin:0 auto; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem; }
.header-zh { font-family:'Noto Serif SC',serif; font-size:0.68rem; letter-spacing:0.4em; color:#b0aaa3; margin-bottom:0.3rem; }
h1 { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:300; letter-spacing:0.05em; line-height:1; }
.header-sub { font-size:0.75rem; letter-spacing:0.15em; color:#b0aaa3; font-style:italic; margin-top:0.25rem; }
.legend { display:flex; flex-wrap:wrap; gap:0.5rem 1.2rem; }
.li { display:flex; align-items:center; gap:0.35rem; font-size:0.66rem; letter-spacing:0.07em; color:#8b8580; }
.ld { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
hr.rule { border:none; border-top:1px solid #e4dfd6; max-width:1400px; margin:0 auto; }
.wrap { max-width:1400px; margin:0 auto; padding:0 3rem 5rem; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.chart { padding-top:1.5rem; }

.year-row { display:flex; }
.yb { font-size:0.62rem; letter-spacing:0.16em; color:#b0aaa3; text-align:center; border-left:1px solid #e4dfd6; padding-bottom:0.3rem; flex-shrink:0; }
.month-row { display:flex; margin-bottom:1.2rem; border-bottom:1px solid #e4dfd6; }
.mb { font-size:0.48rem; color:#ccc8c0; text-align:center; border-left:1px solid #f0ece4; padding:0.18rem 0; flex-shrink:0; overflow:hidden; }

.phase-row { display:flex; align-items:center; margin:2rem 0 0.5rem; }
.pl { flex-shrink:0; padding-right:1rem; text-align:right; font-size:0.52rem; letter-spacing:0.18em; color:#b0aaa3; text-transform:uppercase; }
.pline { flex:1; height:1px; background:#e4dfd6; }
.ptitle { margin-left:0.8rem; font-size:0.6rem; letter-spacing:0.12em; color:#b0aaa3; font-style:italic; white-space:nowrap; }

.track { display:flex; align-items:center; margin-bottom:4px; }
.tlabel { flex-shrink:0; padding-right:1rem; text-align:right; }
.tn { font-size:0.72rem; letter-spacing:0.02em; color:#2a2520; line-height:1.2; }
.ts { font-size:0.56rem; letter-spacing:0.06em; color:#b0aaa3; font-style:italic; margin-top:1px; }
.tbody { flex:1; height:32px; position:relative; border-bottom:1px solid #f8f5f0; }

.bar { position:absolute; height:20px; top:6px; border-radius:2px; display:flex; align-items:center; padding:0 6px; cursor:pointer; transition:filter 0.15s,transform 0.15s; overflow:hidden; white-space:nowrap; }
.bar:hover { filter:brightness(0.88); transform:translateY(-1px); z-index:10; }
.bl { font-size:0.59rem; letter-spacing:0.04em; color:rgba(42,37,32,0.72); overflow:hidden; text-overflow:ellipsis; pointer-events:none; }

.ms { position:absolute; top:50%; transform:translate(-50%,-50%); width:11px; height:11px; border-radius:50%; border:2px solid #f4f1ec; cursor:pointer; z-index:8; transition:transform 0.15s; }
.ms:hover { transform:translate(-50%,-50%) scale(1.6); z-index:20; }
.msl { position:absolute; top:-19px; left:50%; transform:translateX(-50%); font-size:0.52rem; letter-spacing:0.04em; color:#8b8580; white-space:nowrap; pointer-events:none; font-style:italic; }

.today-line { position:absolute; top:-30px; bottom:0; width:1px; background:#c49a2a; opacity:0.5; z-index:20; pointer-events:none; }
.today-lbl { position:absolute; top:0; left:3px; font-size:0.5rem; letter-spacing:0.08em; color:#c49a2a; font-style:italic; white-space:nowrap; }

.gridl { position:absolute; top:0; bottom:0; width:1px; background:#f0ece4; pointer-events:none; }
.gridl.yr { background:#e8e4dc; }

.tooltip { position:fixed; background:#2a2520; color:#f4f1ec; padding:0.65rem 0.95rem; font-size:0.76rem; line-height:1.65; border-radius:2px; pointer-events:none; z-index:200; max-width:240px; display:none; }
.tooltip.on { display:block; }
.tt-t { font-weight:400; font-size:0.82rem; margin-bottom:0.1rem; }
.tt-d { font-size:0.63rem; color:#b0aaa3; font-style:italic; margin-top:0.25rem; }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-zh">聆聽季節</div>
    <h1>listening season</h1>
    <div class="header-sub">brand timeline · mar 2026, mar 2030</div>
  </div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:#A8B8A0"></div>brand & content</div>
    <div class="li"><div class="ld" style="background:#CCB08A"></div>passive income</div>
    <div class="li"><div class="ld" style="background:#D4A8A0"></div>product dev</div>
    <div class="li"><div class="ld" style="background:#8C96A0"></div>tcm school</div>
    <div class="li"><div class="ld" style="background:#9E8B75"></div>community</div>
    <div class="li"><div class="ld" style="background:#4A7090"></div>milestone</div>
  </div>
</header>

<hr class="rule">
<div class="wrap"><div class="chart" id="chart"></div></div>
<div class="tooltip" id="tt"><div class="tt-t" id="tt-t"></div><div id="tt-b"></div><div class="tt-d" id="tt-d"></div></div>

<script>
// ── TIME CONFIG ──
const SY = 2026, SM = 3;
const EY = 2030, EM = 3;
const CW = 19;
const LW = 188;
const MNAMES = ['J','F','M','A','M','J','J','A','S','O','N','D'];

function colOf(y, m) { return (y - SY) * 12 + (m - SM); }
function xOf(y, m)   { return Math.max(0, colOf(y, m)) * CW; }
const TOTAL_COLS = colOf(EY, EM) + 1;

// ── TOOLTIP ──
const ttEl = document.getElementById('tt');
function showTip(e, title, body, date) {
  document.getElementById('tt-t').textContent = title;
  document.getElementById('tt-b').textContent = body || '';
  document.getElementById('tt-d').textContent = date || '';
  ttEl.classList.add('on');
  moveTip(e);
}
function moveTip(e) {
  let lx = e.clientX + 14, ly = e.clientY + 14;
  if (lx + 250 > window.innerWidth)  lx = e.clientX - 254;
  if (ly + 130 > window.innerHeight) ly = e.clientY - 110;
  ttEl.style.left = lx + 'px';
  ttEl.style.top  = ly + 'px';
}
function hideTip() { ttEl.classList.remove('on'); }

// ── TIME HEADER ──
function buildHeader(root) {
  const yr = document.createElement('div');
  yr.className = 'year-row';
  yr.style.marginLeft = LW + 'px';
  for (let y = SY; y <= EY; y++) {
    const m0 = y === SY ? SM : 1;
    const m1 = y === EY ? EM : 12;
    const cols = m1 - m0 + 1;
    const el = document.createElement('div');
    el.className = 'yb';
    el.style.width = el.style.minWidth = (cols * CW) + 'px';
    el.textContent = y;
    yr.appendChild(el);
  }
  root.appendChild(yr);

  const mr = document.createElement('div');
  mr.className = 'month-row';
  mr.style.marginLeft = LW + 'px';
  for (let c = 0; c < TOTAL_COLS; c++) {
    const absM = (SM - 1 + c) % 12;
    const el = document.createElement('div');
    el.className = 'mb';
    el.style.width = el.style.minWidth = CW + 'px';
    el.textContent = MNAMES[absM];
    mr.appendChild(el);
  }
  root.appendChild(mr);
}

// ── TRACK ──
function buildTrack(root, name, sub, bars, milestones, isFirst) {
  const track = document.createElement('div');
  track.className = 'track';

  const lbl = document.createElement('div');
  lbl.className = 'tlabel';
  lbl.style.width = LW + 'px';
  lbl.innerHTML = `<div class="tn">${name}</div>${sub ? `<div class="ts">${sub}</div>` : ''}`;

  const body = document.createElement('div');
  body.className = 'tbody';
  body.style.minWidth = (TOTAL_COLS * CW) + 'px';

  // Grid lines
  for (let c = 0; c < TOTAL_COLS; c++) {
    const absM = (SM - 1 + c) % 12;
    if (absM === 0) {
      const gl = document.createElement('div');
      gl.className = 'gridl yr';
      gl.style.left = (c * CW) + 'px';
      body.appendChild(gl);
    } else if (absM % 3 === 0) {
      const gl = document.createElement('div');
      gl.className = 'gridl';
      gl.style.left = (c * CW) + 'px';
      body.appendChild(gl);
    }
  }

  // Today line
  if (isFirst) {
    const todayX = (6 / 31) * CW;
    const tl = document.createElement('div');
    tl.className = 'today-line';
    tl.style.left = todayX + 'px';
    tl.innerHTML = '<div class="today-lbl">today</div>';
    body.appendChild(tl);
  }

  bars.forEach(b => {
    if (b.d) {
      // milestone-style dot on bar track
      return;
    }
    const bx = xOf(b.s[0], b.s[1]);
    const bw = xOf(b.e[0], b.e[1]) - bx;
    if (bw <= 0) return;
    const el = document.createElement('div');
    el.className = 'bar';
    el.style.cssText = `left:${bx}px;width:${bw}px;background:${b.color}`;
    el.innerHTML = `<span class="bl">${b.label}</span>`;
    el.addEventListener('mouseenter', e => showTip(e, b.label, b.tip, b.dates));
    el.addEventListener('mousemove', moveTip);
    el.addEventListener('mouseleave', hideTip);
    body.appendChild(el);
  });

  (milestones || []).forEach(m => {
    const mx = xOf(m.d[0], m.d[1]);
    const el = document.createElement('div');
    el.className = 'ms';
    el.style.cssText = `left:${mx}px;background:${m.color}`;
    el.innerHTML = `<span class="msl">${m.label}</span>`;
    el.addEventListener('mouseenter', e => showTip(e, m.label, m.tip, m.date));
    el.addEventListener('mousemove', moveTip);
    el.addEventListener('mouseleave', hideTip);
    body.appendChild(el);
  });

  track.appendChild(lbl);
  track.appendChild(body);
  root.appendChild(track);
}

// ── PHASE MARKER (vertical drop line + label at top) ──
function buildPhaseMarker(root, y, m, label) {
  const x = xOf(y, m);
  const row = document.createElement('div');
  row.className = 'track phase-marker-row';
  row.style.height = '22px';
  row.style.marginBottom = '0';

  const lbl = document.createElement('div');
  lbl.className = 'tlabel';
  lbl.style.width = LW + 'px';

  const body = document.createElement('div');
  body.className = 'tbody phase-marker-body';
  body.style.minWidth = (TOTAL_COLS * CW) + 'px';
  body.style.height = '22px';
  body.style.borderBottom = 'none';

  const line = document.createElement('div');
  line.style.cssText = `position:absolute;left:${x}px;top:0;bottom:0;width:1px;background:#c8c0b4;`;
  const labelEl = document.createElement('div');
  labelEl.style.cssText = `position:absolute;left:${x + 4}px;top:3px;font-size:0.5rem;letter-spacing:0.14em;color:#a0988f;font-style:italic;white-space:nowrap;text-transform:uppercase;`;
  labelEl.textContent = label;

  body.appendChild(line);
  body.appendChild(labelEl);
  row.appendChild(lbl);
  row.appendChild(body);
  root.appendChild(row);
}

// ── SOLAR TERM PULSE (24 repeating segments across full width) ──
function buildPulseTrack(root, name, sub) {
  const track = document.createElement('div');
  track.className = 'track';

  const lbl = document.createElement('div');
  lbl.className = 'tlabel';
  lbl.style.width = LW + 'px';
  lbl.innerHTML = `<div class="tn">${name}</div>${sub ? `<div class="ts">${sub}</div>` : ''}`;

  const body = document.createElement('div');
  body.className = 'tbody';
  body.style.minWidth = (TOTAL_COLS * CW) + 'px';
  body.style.height = '28px';

  // Grid lines
  for (let c = 0; c < TOTAL_COLS; c++) {
    const absM = (SM - 1 + c) % 12;
    if (absM === 0) {
      const gl = document.createElement('div');
      gl.className = 'gridl yr';
      gl.style.left = (c * CW) + 'px';
      body.appendChild(gl);
    }
  }

  // 24 solar terms across 4 years, ~15 days each = ~0.5 months each
  // Draw as alternating pulse segments across the full timeline
  const totalMonths = TOTAL_COLS;
  const termWidth = CW * 0.49; // ~15 days
  const seasonColors = [
    '#B8C8A8','#A8BC98','#98B08A','#88A47C', // spring
    '#D4A87C','#CC9C70','#C49064','#BC8458', // summer
    '#C4A87C','#B89C70','#AC9064','#A08458', // autumn
    '#9CAAB8','#8CA0B0','#7C96A8','#6C8CA0', // winter
    '#B8C8A8','#A8BC98','#98B08A','#88A47C', // spring again
    '#D4A87C','#CC9C70','#C49064','#BC8458', // summer again
    '#C4A87C','#B89C70','#AC9064','#A08458', // autumn again
    '#9CAAB0','#8CA0A8',                      // winter partial
  ];

  // 24 terms per year, each ~15.2 days. Start from Mar 2026.
  // Approximate: place 24 terms × number of years shown
  const termsToShow = Math.floor(totalMonths * 2); // ~2 terms per month
  for (let i = 0; i < termsToShow; i++) {
    const x = i * termWidth * 2; // gap between starts = ~30 days
    if (x > totalMonths * CW) break;
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${x}px;width:${termWidth}px;height:20px;top:4px;border-radius:1px;background:${seasonColors[i % 24]};opacity:0.75;`;
    el.title = `Solar term ${(i % 24) + 1} of 24`;
    body.appendChild(el);
  }

  // Pulse label
  const forever = document.createElement('div');
  forever.style.cssText = `position:absolute;right:4px;top:6px;font-size:0.48rem;letter-spacing:0.1em;color:#a0988f;font-style:italic;`;
  forever.textContent = '↻ forever';
  body.appendChild(forever);

  track.appendChild(lbl);
  track.appendChild(body);
  root.appendChild(track);
}

// ══════════════════════════════════════════════════
// BUILD
// ══════════════════════════════════════════════════
const chart = document.getElementById('chart');
buildHeader(chart);

// ── SOLAR TERM PULSE (always first, always running) ──
buildPulseTrack(chart, '二十四節氣 Pulse', '15-day rhythm · never ends');

// ── PHASE 1 MARKER ──
buildPhaseMarker(chart, 2026, 3, 'Phase 1 · The Art of Listening · Mar–Aug 2026');

// ── BRAND & CONTENT ──
buildTrack(chart, 'Brand & Content', 'instagram · study in public', [
  { label:'Build in public · solar terms', s:[2026,3], e:[2026,9],
    color:'#C8D4BE', tip:'Establish the 15-day pulse. Post around each solar term. Build the habit before school starts.', dates:'Mar → Aug 2026' },
  { label:'Learning out loud · TCM integration', s:[2026,9], e:[2027,9],
    color:'#B8C8B0', tip:'Solar terms content gains real TCM depth. Learning out loud becomes a beloved series.', dates:'Sep 2026 → Aug 2027' },
  { label:'Year 2 · richer observations', s:[2027,9], e:[2028,9],
    color:'#A8B8A0', tip:'Second layer of the living notebook. Same 24 terms, audience feels the difference in depth.', dates:'Sep 2027 → Aug 2028' },
  { label:'R.Ac practitioner content', s:[2028,11], e:[2029,12],
    color:'#A0B898', tip:'Third layer. Clinical observations. Audience has followed the whole journey.', dates:'Nov 2028 → Dec 2029' },
  { label:'Clinic brand · Dr.TCM voice', s:[2030,1], e:[2030,3],
    color:'#98B090', tip:'The brand and the practice become the same thing.', dates:'Jan → Mar 2030' },
],[
  { label:'First post', d:[2026,3], color:'#A8B8A0', tip:'Listening Season goes live on Instagram.', date:'Mar 2026' },
], true);

// ── TCM SCHOOL ──
buildTrack(chart, 'TCM School', 'acupuncture S1–6 · herbology S7–10', [
  { label:'S1 · Foundations', s:[2026,9], e:[2026,12],
    color:'#C0C8D0', tip:'TCM theory. Five elements, yin/yang, qi, meridian overview.', dates:'Sep–Dec 2026' },
  { label:'S2 · Points', s:[2027,1], e:[2027,5],
    color:'#B8C2CC', tip:'Acupuncture point locations. Meridian pathways. Study notes feed Capacities.', dates:'Jan–Apr 2027' },
  { label:'S3 · Patterns', s:[2027,5], e:[2027,9],
    color:'#AEBCC8', tip:'Pattern differentiation. Seeing the body through a TCM lens.', dates:'May–Aug 2027' },
  { label:'S4 · Clinical theory', s:[2027,9], e:[2027,12],
    color:'#A2B4C2', tip:'Treatment principles. Living notebook year 2, noticeably richer.', dates:'Sep–Dec 2027' },
  { label:'S5 · Clinical practice', s:[2028,1], e:[2028,5],
    color:'#96AABC', tip:'Supervised clinical hours begin. Board exam prep starts.', dates:'Jan–Apr 2028' },
  { label:'S6 · Final acup.', s:[2028,5], e:[2028,9],
    color:'#8C96A0', tip:'Final acupuncture semester. Board exam Oct 2028.', dates:'May–Aug 2028' },
  { label:'S7 · Materia medica', s:[2028,9], e:[2028,12],
    color:'#C0CEB8', tip:'Single herbs. Materia medica. Botanical world opens, rich content territory.', dates:'Sep–Dec 2028' },
  { label:'S8 · Formulas', s:[2029,1], e:[2029,5],
    color:'#B4C4AC', tip:'Herbal formulas. Pattern-based prescribing.', dates:'Jan–Apr 2029' },
  { label:'S9 · Advanced clinical', s:[2029,5], e:[2029,9],
    color:'#A8BAA0', tip:'Advanced clinical herbology. Integration with acupuncture deepens.', dates:'May–Aug 2029' },
  { label:'S10 · Final', s:[2029,9], e:[2029,12],
    color:'#9CB094', tip:'Final semester. Board exam prep. Clinical hours complete.', dates:'Sep–Dec 2029' },
],[
  { label:'School starts', d:[2026,9], color:'#8C96A0', tip:'TCM school begins. The Study in Public era opens.', date:'Sep 2026' },
  { label:'R.Ac board exam', d:[2028,10], color:'#4A7090', tip:'BC board exam, twice/year. Sit Oct 2028 after S6.', date:'Oct 2028' },
  { label:'R.Ac ✓', d:[2028,11], color:'#2d5a7a', tip:'Registered Acupuncturist. Can now practice while continuing herbology.', date:'Nov 2028' },
  { label:'Dr.TCM board exam', d:[2030,2], color:'#4a7a4a', tip:'Second board exam. Sit early 2030 after S10.', date:'Feb 2030' },
  { label:'Dr. TCM ✓', d:[2030,3], color:'#2a5a2a', tip:'Full Doctor of TCM. Acupuncture + Herbology.', date:'Mar 2030' },
]);

// ── PHASE 2 MARKER ──
buildPhaseMarker(chart, 2026, 9, 'Phase 2 · TCM School · Acupuncture · Sep 2026–Aug 2028');

// ── ACUPUNCTURE PRACTICE ──
buildTrack(chart, 'Acupuncture Practice', 'r.ac · seeing patients', [
  { label:'Building clientele', s:[2028,11], e:[2030,3],
    color:'#C8D8C0', tip:'Seeing patients while completing herbology. Brand audience = first referral network.', dates:'Nov 2028 → Mar 2030' },
],[
  { label:'First patients', d:[2028,11], color:'#5a7a4a', tip:'First paying patients as R.Ac.', date:'Nov 2028' },
]);

// ── PASSIVE INCOME ──
buildTrack(chart, 'Passive Income', 'planner · zines · workshops', [
  { label:'2027 Solar Terms Planner', s:[2026,10], e:[2027,1],
    color:'#EAD4A0', tip:'First paid product. Digital or printed planner for 2027.', dates:'Oct 2026 → Jan 2027' },
  { label:'Zine No.1 · Spring', s:[2027,2], e:[2027,4],
    color:'#E0C890', tip:'First seasonal zine. Six spring terms. Personal essay + observation logs.', dates:'Feb → Apr 2027' },
  { label:'Zine No.2 · Summer', s:[2027,6], e:[2027,8],
    color:'#D8BC80', tip:'Second zine. Summer terms. The series finds its audience.', dates:'Jun → Jul 2027' },
  { label:'Zine No.3 · Autumn', s:[2027,9], e:[2027,11],
    color:'#D0B070', tip:'Third zine. Autumn terms. Waiting list forming.', dates:'Sep → Oct 2027' },
  { label:'Zine No.4 · Winter', s:[2027,12], e:[2028,2],
    color:'#C8A460', tip:'Fourth zine. Winter. Year one of the series complete.', dates:'Dec 2027 → Jan 2028' },
  { label:'2028 Planner', s:[2027,10], e:[2028,1],
    color:'#EAD4A0', tip:'Second annual planner. More TCM depth. Returning buyers.', dates:'Oct 2027 → Jan 2028' },
  { label:'Zine Year 2', s:[2028,2], e:[2028,9],
    color:'#CCB08A', tip:'Year 2 of the zine series. TCM student voice adds credibility.', dates:'Feb → Aug 2028' },
  { label:'Zine Year 3 · TCM depth', s:[2028,10], e:[2029,8],
    color:'#C4A870', tip:'Year 3 zines. Clinical voice. Herbology enters the series. Premium pricing justified.', dates:'Oct 2028 → Jul 2029' },
  { label:'2029 Planner + bundle', s:[2028,10], e:[2029,1],
    color:'#EAD4A0', tip:'Third annual planner. Bundle with past zines for gift season.', dates:'Oct 2028 → Jan 2029' },
  { label:'Workshop · seasonal TCM', s:[2029,3], e:[2029,9],
    color:'#D4B880', tip:'First paid workshop. Seasonal self-care through TCM. Live or recorded. Small group.', dates:'Mar → Aug 2029' },
  { label:'2030 Planner · clinic edition', s:[2029,10], e:[2029,12],
    color:'#EAD4A0', tip:'Fourth annual planner. Clinic launch edition.', dates:'Oct → Dec 2029' },
],[
  { label:'First revenue', d:[2027,1], color:'#CCB08A', tip:'Solar Terms Planner goes on sale, first income.', date:'Jan 2027' },
  { label:'First workshop', d:[2029,3], color:'#B89060', tip:'First paid live workshop.', date:'Mar 2029' },
]);

// ── PRODUCT DEV ──
buildTrack(chart, 'Product Dev', 'making the things', [
  { label:'Observation Log PDF', s:[2026,5], e:[2026,7],
    color:'#E8C4BC', tip:'Free lead magnet. Printable observation log. Hook that builds the email list.', dates:'May → Jun 2026' },
  { label:'Planner design', s:[2026,10], e:[2026,12],
    color:'#DEB8B0', tip:'Designing the 2027 Solar Terms Planner. Your palette, your observations as copy.', dates:'Oct → Dec 2026' },
  { label:'Zine No.1 · writing + design', s:[2027,1], e:[2027,3],
    color:'#D4ACA4', tip:'Writing, designing, printing Zine No.1 · Spring. Limited run.', dates:'Jan → Mar 2027' },
  { label:'Snail mail pilot', s:[2027,4], e:[2027,6],
