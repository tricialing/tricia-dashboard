<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Season — 二十四节气</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f1ec;
    color: #2a2520;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 4rem 3rem 2rem;
    max-width: 960px;
    margin: 0 auto;
  }
  .header-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: #b0aaa3;
    margin-bottom: 0.4rem;
  }
  h1 {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .header-sub {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: #b0aaa3;
    font-style: italic;
    margin-top: 0.3rem;
  }
  .color-band {
    max-width: 960px;
    margin: 2rem auto 0;
    padding: 0 3rem;
    display: flex;
    height: 4px;
    gap: 1px;
  }
  .band-seg {
    flex: 1;
    height: 100%;
    cursor: pointer;
    transition: height 0.15s, margin-top 0.15s, opacity 0.15s;
    opacity: 0.65;
  }
  .band-seg:hover { height: 8px; margin-top: -4px; opacity: 1; }
  .band-seg.active { height: 10px; margin-top: -6px; opacity: 1; }

  nav {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.8rem 3rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.78rem; letter-spacing: 0.2em;
    color: #b0aaa3; padding: 0; transition: color 0.2s;
  }
  .nav-btn.active { color: #2a2520; border-bottom: 1px solid #2a2520; padding-bottom: 1px; }
  .nav-btn:hover { color: #2a2520; }
  .nav-sep { width: 1px; height: 10px; background: #d8d2c8; }
  .season-filters { margin-left: auto; display: flex; gap: 1.2rem; align-items: center; }
  .sfbtn {
    background: none; border: none; cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem; letter-spacing: 0.15em;
    color: #b0aaa3; display: flex; align-items: center; gap: 0.35rem; transition: color 0.2s;
  }
  .sfbtn .dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0.35; transition: opacity 0.2s; }
  .sfbtn.active { color: #2a2520; }
  .sfbtn.active .dot { opacity: 1; }
  .sfbtn:hover { color: #2a2520; }
  .sfbtn:hover .dot { opacity: 0.8; }

  hr.rule { border: none; border-top: 1px solid #e4dfd6; max-width: 960px; margin: 0 auto; }

  /* GRID */
  #grid-view {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 3rem 2rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: #e4dfd6;
  }
  .term-card {
    background: var(--tc-bg, #f4f1ec);
    padding: 1.5rem 1.3rem 1.3rem;
    cursor: pointer;
    transition: filter 0.15s, opacity 0.15s;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .term-card:hover { filter: brightness(0.96); }
  .term-card.active { filter: brightness(0.93); outline: 1px solid rgba(0,0,0,0.08); }
  .term-card.dimmed { opacity: 0.28; pointer-events: none; }
  .card-top { display: flex; justify-content: space-between; }
  .card-zh { font-family: 'Noto Serif SC', serif; font-size: 0.72rem; font-weight: 300; color: rgba(42,37,32,0.4); letter-spacing: 0.08em; }
  .card-index { font-size: 0.58rem; letter-spacing: 0.1em; color: rgba(42,37,32,0.25); }
  .card-name { margin-top: auto; padding-top: 1.5rem; font-size: 0.82rem; font-weight: 300; letter-spacing: 0.04em; line-height: 1.4; color: rgba(42,37,32,0.65); }
  .card-vibe { font-size: 0.6rem; letter-spacing: 0.1em; color: rgba(42,37,32,0.4); margin-top: 0.3rem; font-style: italic; }

  /* DETAIL */
  #detail-panel {
    display: none;
    max-width: 960px;
    margin: 0 auto;
    border-top: 1px solid #e4dfd6;
    border-bottom: 1px solid #e4dfd6;
    background: #faf8f4;
  }
  #detail-panel.open { display: block; }
  .detail-bar { height: 3px; width: 100%; transition: background 0.4s; }
  .detail-body {
    padding: 2.5rem 3rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
  }
  .d-zh-big {
    font-family: 'Noto Serif SC', serif;
    font-size: 3.5rem; font-weight: 300;
    opacity: 0.15; line-height: 1;
    margin-bottom: 0.3rem; letter-spacing: 0.08em;
    transition: color 0.4s;
  }
  .d-name { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 300; letter-spacing: 0.04em; line-height: 1.1; color: #2a2520; }
  .d-pinyin { font-size: 0.78rem; letter-spacing: 0.15em; color: #b0aaa3; margin-top: 0.3rem; font-style: italic; }
  .d-meta { display: flex; gap: 2rem; margin: 1.2rem 0 1.5rem; flex-wrap: wrap; }
  .d-meta-item { display: flex; flex-direction: column; gap: 0.1rem; }
  .d-meta-label { font-size: 0.58rem; letter-spacing: 0.25em; color: #b0aaa3; text-transform: uppercase; }
  .d-meta-val { font-size: 0.82rem; color: #6b6560; font-style: italic; }
  .d-desc { font-style: italic; font-size: 1rem; line-height: 1.8; color: #6b6560; padding-left: 1rem; border-left: 1px solid #e4dfd6; }
  .d-section-label { font-size: 0.58rem; letter-spacing: 0.28em; color: #b0aaa3; text-transform: uppercase; margin-bottom: 0.7rem; }
  .d-tcm { font-size: 0.88rem; line-height: 1.8; color: #6b6560; margin-bottom: 2rem; }
  .d-content-box { padding: 1.1rem 1.3rem; border-left: 2px solid; background: #f4f1ec; transition: border-color 0.4s; }
  .d-content-box p { font-style: italic; font-size: 0.88rem; line-height: 1.8; color: #2a2520; }
  .d-close {
    width: 100%; padding: 0.9rem 3rem;
    background: none; border: none; border-top: 1px solid #e4dfd6;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem; letter-spacing: 0.25em; color: #b0aaa3;
    cursor: pointer; text-align: left; transition: color 0.2s;
  }
  .d-close:hover { color: #2a2520; }

  /* LIST */
  #list-view { display: none; max-width: 960px; margin: 0 auto; padding: 0 3rem 4rem; }
  .ls-season-head {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 2rem 0 0.8rem;
    border-bottom: 1px solid #e4dfd6;
  }
  .ls-season-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ls-season-en { font-size: 0.68rem; letter-spacing: 0.3em; color: #b0aaa3; }
  .ls-season-zh { font-family: 'Noto Serif SC', serif; font-size: 0.68rem; font-weight: 300; color: #b0aaa3; margin-left: auto; }
  .ls-row {
    display: grid;
    grid-template-columns: 1.5rem 1fr auto auto;
    gap: 1.5rem; align-items: baseline;
    padding: 0.9rem 0;
    border-bottom: 1px solid #f0ece4;
    cursor: pointer; transition: background 0.15s;

  .ls-row:hover { background: #faf8f4; margin: 0 -1rem; padding: 0.9rem 1rem; }
  .ls-idx { font-size: 0.6rem; color: #ccc8c0; letter-spacing: 0.05em; text-align: right; }
  .ls-en { font-size: 0.95rem; letter-spacing: 0.02em; }
  .ls-zh { font-family: 'Noto Serif SC', serif; font-size: 0.72rem; font-weight: 300; color: #b0aaa3; }
  .ls-date { font-size: 0.68rem; letter-spacing: 0.08em; color: #b0aaa3; font-style: italic; white-space: nowrap; }
  .ls-expanded { display: none; padding: 1rem 0 1.5rem 3rem; background: #faf8f4; border-bottom: 1px solid #e4dfd6; }
  .ls-expanded.open { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .ls-exp-desc { font-style: italic; font-size: 0.88rem; line-height: 1.75; color: #6b6560; margin-bottom: 0.8rem; }
  .ls-exp-tcm { font-size: 0.8rem; line-height: 1.7; color: #6b6560; }
  .ls-exp-content { font-size: 0.8rem; line-height: 1.7; color: #2a2520; font-style: italic; padding: 0.8rem 1rem; border-left: 2px solid; background: #f4f1ec; align-self: start; }

  .today-marker::before {
    content: 'today';
    position: absolute;
    top: 0.4rem; right: 0.5rem;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: #b0aaa3;
    font-style: italic;

    hr.rule { margin: 0 1.5rem; }
    #grid-view { padding: 0 1.5rem 2rem; grid-template-columns: repeat(2, 1fr); }
    .detail-body { grid-template-columns: 1fr; gap: 1.5rem; padding: 2rem 1.5rem; }
    .d-close { padding: 0.9rem 1.5rem; }
    #list-view { padding: 0 1.5rem 3rem; }
    .ls-expanded.open { grid-template-columns: 1fr; }
    .season-filters { display: none; }

// Mix hex color with paper (#f4f1ec) at given opacity to create soft wash
function hexToWash(hex, opacity) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const pr = 244, pg = 241, pb = 236; // #f4f1ec
  const mr = Math.round(pr + (r - pr) * opacity);
  const mg = Math.round(pg + (g - pg) * opacity);
  const mb = Math.round(pb + (b - pb) * opacity);
  return `rgb(${mr},${mg},${mb})`;
}

function buildBand() {
  const band = document.getElementById('colorBand');
  TERMS.forEach((t, i) => {
    const seg = document.createElement('div');
    seg.className = 'band-seg';
    seg.style.background = t.hex;
    seg.title = t.name;
    seg.onclick = () => { if (activeView !== 'grid') setView('grid'); openDetail(i); };
    band.appendChild(seg);
  });
}

function buildGrid() {
  const grid = document.getElementById('grid-view');
  TERMS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.id = `card-${i}`;
    // Convert hex to a soft wash: mix with paper at ~35% opacity
    card.style.setProperty('--tc-bg', hexToWash(t.hex, 0.32));
    const isToday = (i === 2); // Mar 5 = Awakening of Insects
    if (isToday) card.classList.add('today-marker');
    card.innerHTML = `
      <div class="card-top">
        <span class="card-zh">${t.zh}</span>
        <span class="card-index">${String(i+1).padStart(2,'0')}</span>
      </div>
      <div class="card-name">${t.name}</div>
      <div class="card-vibe">${t.vibe}</div>
    `;
    card.onclick = () => openDetail(i);
    grid.appendChild(card);
  });
}

function buildList() {
  const list = document.getElementById('list-view');
  ['spring','summer','autumn','winter'].forEach(s => {
    const head = document.createElement('div');
    head.className = 'ls-season-head';
    head.dataset.season = s;
    head.innerHTML = `<div class="ls-season-dot" style="background:${SEASON_COLORS[s]}"></div><span class="ls-season-en">${s}</span><span class="ls-season-zh">${SEASON_ZH[s]}</span>`;
    list.appendChild(head);

    TERMS.forEach((t, i) => {
      if (t.season !== s) return;
      const row = document.createElement('div');
      row.className = 'ls-row';
      row.dataset.season = s;
      row.innerHTML = `<span class="ls-idx">${String(i+1).padStart(2,'0')}</span><span class="ls-en">${t.name}</span><span class="ls-zh">${t.zh}</span><span class="ls-date">${t.date}</span>`;

      const exp = document.createElement('div');
      exp.className = 'ls-expanded';
      exp.dataset.season = s;
      exp.innerHTML = `
        <div><div class="ls-exp-desc">${t.desc}</div><div class="ls-exp-tcm">${t.tcm}</div></div>
        <div class="ls-exp-content" style="border-color:${t.hex}">${t.content}</div>
      `;
      row.onclick = () => {
        const was = exp.classList.contains('open');
        document.querySelectorAll('.ls-expanded').forEach(e => e.classList.remove('open'));
        if (!was) exp.classList.add('open');
      };
      list.appendChild(row);
      list.appendChild(exp);
    });
  });
}

function openDetail(i) {
  const t = TERMS[i];
  activeIndex = i;
  document.querySelectorAll('.band-seg').forEach((s,idx) => s.classList.toggle('active', idx === i));
  document.querySelectorAll('.term-card').forEach((c,idx) => c.classList.toggle('active', idx === i));

  document.getElementById('detailBar').style.background = t.hex;
  document.getElementById('dZh').style.color = t.hex;
  document.getElementById('dBox').style.borderColor = t.hex;

  document.getElementById('dZh').textContent = t.zh;
  document.getElementById('dName').textContent = t.name;
  document.getElementById('dPinyin').textContent = t.pinyin;
  document.getElementById('dDate').textContent = t.date + ', 2026';
  document.getElementById('dElement').textContent = t.element;
  document.getElementById('dOrgan').textContent = t.organ;
  document.getElementById('dVibe').textContent = t.vibe;
  document.getElementById('dDesc').textContent = t.desc;
  document.getElementById('dTcm').textContent = t.tcm;
  document.getElementById('dContent').textContent = t.content;

  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.term-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.band-seg').forEach(s => s.classList.remove('active'));
  activeIndex = null;
}

function setView(v) {
  activeView = v;
  document.getElementById('grid-view').style.display = v === 'grid' ? 'grid' : 'none';
  document.getElementById('detail-panel').style.display = v === 'grid' ? '' : 'none';
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  if (v === 'list') filterSeason(activeFilter, true);
}

function filterSeason(s, skipBtn) {
  activeFilter = s;
  if (!skipBtn) document.querySelectorAll('.sfbtn').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  if (activeView === 'grid') {
    document.querySelectorAll('.term-card').forEach((c, i) => c.classList.toggle('dimmed', s !== 'all' && TERMS[i].season !== s));
  } else {
    document.querySelectorAll('[data-season]').forEach(el => {
      el.style.display = (s === 'all' || el.dataset.season === s) ? '' : 'none';
    });
  }
}

buildBand();
buildGrid();
buildList();
setView('grid');
</script>
</body>
</html>
